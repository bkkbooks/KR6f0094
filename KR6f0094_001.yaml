body:
  text: 劉宋天竺三藏求那跋陀羅奉詔重譯南無阿彌多婆夜哆多曷切一他伽哆都餓切二夜哆地途賣切三夜他阿彌利上聲四都婆毗五阿彌利哆六悉耽婆毗七阿彌利哆八毗迦蘭諦九阿彌利哆十毗迦蘭哆十一伽彌膩十二伽伽那十三枳多迦隸十四莎婆訶十五若有善男子善女人能誦此呪者阿彌陀佛常住其頂日夜擁護無令怨家而得其便現世常得安隱臨命終時任運往生阿彌陀經不思議神力傳附隋録未詳作者昔長安僧睿法師慧崇僧顯慧通近至後周實禪師景禪師西河鸞法師等數百餘人並生西方西河綽禪師等因見鸞法師得生淨土各率有緣專修淨土之業綽師又撰西方記驗名安樂集流行又晉朝遠法師入盧山三十年不出乃命同志白黑有一百二十三人立誓期於西方鑿山銘願至陳天嘉年盧山珍禪師於坐時見有數百餘人共乘七寶華舫往西方珍禪師遂求附載其船上人報云法師雖講得涅槃經亦大不可思議緣法師未誦得阿彌陀經及呪所以不得同去法師遂廢講業日夜專誦彌陀經及呪計應滿二萬遍未終四七日前夜向四更有神人從西方送一白銀臺來空中明過於日告云法師壽終當乘此臺往生阿彌陀國故來相示令知定生終時白黑咸聞空中如奏音樂并聞異香數月聞香氣不歇其夜峯頂寺僧衆咸見一谷內有數十炬火大如車輪尋驗古今得生安樂世界者非一多見化佛徒衆來迎靈瑞如傳廣明不可繁録因珍禪師於此經有驗故略述此一條以悟來哲助成往生之志拔一切業障根本得生淨土神呪者乃宋元嘉末年求那跋陀重奉制譯合計五十九字一十五句龍樹菩薩願生安養夢感此咒耶舍三藏誦此呪天平寺鏽法師從耶舍三藏口受此呪其人云經本外國不來若欲受持呪法嚼楊枝澡豆漱口然香於佛像前胡跪合掌日夜六時各誦三七遍即滅四重五逆十惡謗方等罪悉得滅除現世所求皆得不為惡鬼神所惑亂若數滿二十萬遍即感得菩提牙生若至三十萬遍即面見阿彌陀佛
