  - {type: variant, offset: 15, length: 137, content: '南無阿彌多婆夜哆多曷切＝反【元】【宋】切【大】，反【元】【宋】切反一　他伽哆＝跢【元】哆【大】，跢【元】哆跢都餓切二　夜哆地途賣切三　夜他阿彌利上聲四　都婆毘五　阿彌利哆六　悉眈婆毘七　阿彌利哆八　毘迦蘭諦九　阿彌利哆十　毘迦蘭哆十一　伽彌膩十二　伽伽那十三　枳多迦隷十四　莎婆訶十五

      若有善男子善女人能誦此呪者，阿彌陀佛常住其頂，日夜擁護，無令怨家而得其便，現世常得安隱，臨命終時任運往生。', 宋: ''}
